<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>logcloak docs — reference</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark-dimmed.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
:root{--bg:#0a0a0b;--surface:#111113;--border:#222226;--text:#f0f0f2;
  --muted:#666670;--accent:#7c6aff;--mono:"Geist Mono","JetBrains Mono",Consolas,monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.7}
nav{border-bottom:1px solid var(--border);padding:0 24px;
  background:rgba(10,10,11,.9);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:99}
.nav-w{max-width:1024px;margin:0 auto;height:52px;display:flex;align-items:center}
.logo{font-family:var(--mono);font-size:.9rem;font-weight:700;color:var(--text);
  text-decoration:none;display:flex;align-items:center;gap:8px}
.logo::before{content:"🔒"}
.nav-links{display:flex;gap:2px;margin-left:auto}
.nav-links a{font-size:.82rem;color:var(--muted);text-decoration:none;
  padding:5px 10px;border-radius:5px;transition:color .1s,background .1s}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-links a.cur{color:var(--accent)}
.nav-gh{background:var(--surface);border:1px solid var(--border);
  border-radius:6px;margin-left:8px;color:var(--text)!important}
.nav-gh:hover{border-color:var(--accent)!important}
.page-wrap{display:grid;grid-template-columns:240px 1fr;
  max-width:1100px;margin:0 auto;min-height:calc(100vh - 52px)}
.sidebar{border-right:1px solid var(--border);padding:28px 0;
  position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar-title{font-family:var(--mono);font-size:.65rem;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.1em;
  padding:0 20px;margin:16px 0 6px}
.sidebar-title:first-child{margin-top:0}
.sidebar a{display:block;color:var(--muted);text-decoration:none;
  font-size:.82rem;padding:5px 20px;line-height:1.4;
  border-left:2px solid transparent;transition:color .12s,border-color .12s,background .12s}
.sidebar a:hover{color:var(--text);background:rgba(255,255,255,.03)}
.sidebar a.active{color:var(--accent);border-left-color:var(--accent);
  background:rgba(124,106,255,.05)}
.sidebar a.h3{padding-left:32px;font-size:.78rem}
.content{padding:48px 52px 100px;min-width:0}
.page-head{margin-bottom:40px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.eyebrow{font-family:var(--mono);font-size:.7rem;font-weight:700;color:var(--accent);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.page-head h1{font-size:1.9rem;font-weight:800;letter-spacing:-.03em}
.page-head p{color:var(--muted);margin-top:8px}
#md h1,#md h2,#md h3{font-weight:700;letter-spacing:-.02em;margin:2.2rem 0 .8rem;line-height:1.3}
#md h1{font-size:1.6rem;border-bottom:1px solid var(--border);padding-bottom:.5rem}
#md h2{font-size:1.25rem;border-bottom:1px solid rgba(34,34,38,.6);padding-bottom:.4rem}
#md h3{font-size:1.05rem;color:rgba(240,240,242,.85)}
#md p{margin-bottom:1rem}
#md ul,#md ol{margin:0 0 1rem 1.4rem}
#md li{margin-bottom:.3rem}
#md code{font-family:var(--mono);font-size:.8rem;
  background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.15);
  border-radius:4px;padding:2px 6px;color:#b0a4ff}
#md pre{margin:1.2rem 0;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
#md pre code{background:none;border:none;padding:0;font-size:.79rem;color:inherit;line-height:1.7}
#md table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.85rem}
#md th{text-align:left;padding:9px 14px;color:var(--muted);font-size:.75rem;
  text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);font-family:var(--mono)}
#md td{padding:9px 14px;border-bottom:1px solid rgba(34,34,38,.6)}
#md tr:last-child td{border:none}
#md tr:hover td{background:rgba(255,255,255,.02)}
#md a{color:var(--accent);text-decoration:none}
#md a:hover{text-decoration:underline}
#md hr{border:none;border-top:1px solid var(--border);margin:2rem 0}
#md blockquote{border-left:3px solid var(--accent);padding:.6rem 1rem;
  margin:1rem 0;background:rgba(124,106,255,.05);border-radius:0 7px 7px 0;color:var(--muted)}
#md strong{font-weight:600;color:var(--text)}
.spinner{text-align:center;padding:80px;color:var(--muted);
  font-family:var(--mono);font-size:.85rem}
footer{border-top:1px solid var(--border);padding:28px 24px;
  text-align:center;color:var(--muted);font-size:.78rem;font-family:var(--mono)}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--text)}
.sep{margin:0 8px;opacity:.3}
@media(max-width:760px){
  .page-wrap{grid-template-columns:1fr}.sidebar{display:none}
  .content{padding:28px 20px 60px}
  .nav-links a:not(.nav-gh):not(.cur){display:none}}
</style>
</head>
<body>
<nav>
  <div class="nav-w">
    <a class="logo" href="/logcloak/">logcloak</a>
    <div class="nav-links">
      <a href="/logcloak/">Home</a>
      <a href="/logcloak/guide.html">Guide</a>
      <a href="/logcloak/docs.html" class="cur">Docs</a>
      <a href="/logcloak/tool/">Pattern Tool</a>
      <a href="https://github.com/1mr0-tech/logcloak" class="nav-gh">GitHub</a>
    </div>
  </div>
</nav>
<div class="page-wrap">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">On this page</div>
    <div id="toc"><a href="#" style="padding:5px 20px;color:var(--muted);font-size:.8rem">Loading…</a></div>
  </aside>
  <div class="content">
    <div class="page-head">
      <div class="eyebrow">Reference docs</div>
      <h1>Complete configuration reference</h1>
      <p>All annotations, Helm values, CRD fields, and pattern definitions in one place.</p>
    </div>
    <div id="md"><div class="spinner">loading…</div></div>
  </div>
</div>
<footer>
  <a href="/logcloak/">home</a><span class="sep">·</span>
  <a href="/logcloak/docs.html">docs</a><span class="sep">·</span>
  <a href="/logcloak/tool/">pattern tool</a><span class="sep">·</span>
  <a href="https://github.com/1mr0-tech/logcloak">github</a>
</footer>
<script>
marked.setOptions({gfm:true,breaks:false});

function slugify(text){
  return text.toLowerCase().replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-');
}

function buildTOC(){
  const toc=document.getElementById('toc');
  const headings=document.querySelectorAll('#md h2, #md h3');
  if(!headings.length){toc.innerHTML='';return;}
  let html='';
  headings.forEach(h=>{
    const level=h.tagName==='H2'?'h2':'h3';
    const id=h.id||slugify(h.textContent);
    h.id=id;
    html+=`<a href="#${id}" class="${level==='h3'?'h3':''}" data-id="${id}">${h.textContent}</a>`;
  });
  toc.innerHTML=html;
  toc.querySelectorAll('a').forEach(a=>{
    a.addEventListener('click',e=>{
      e.preventDefault();
      const el=document.getElementById(a.dataset.id);
      if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    });
  });
}

function initScrollSpy(){
  const links=document.querySelectorAll('#toc a[data-id]');
  const targets=[...document.querySelectorAll('#md h2, #md h3')];
  if(!targets.length)return;
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        links.forEach(l=>l.classList.remove('active'));
        const a=document.querySelector(`#toc a[data-id="${e.target.id}"]`);
        if(a){
          a.classList.add('active');
          a.scrollIntoView({block:'nearest'});
        }
      }
    });
  },{rootMargin:'-52px 0px -70% 0px',threshold:0});
  targets.forEach(t=>obs.observe(t));
}

fetch('https://raw.githubusercontent.com/1mr0-tech/logcloak/main/documentation.md')
  .then(r=>r.text())
  .then(md=>{
    document.getElementById('md').innerHTML=marked.parse(md);
    document.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));
    buildTOC();
    initScrollSpy();
  })
  .catch(()=>{
    document.getElementById('md').innerHTML=
      '<p style="color:var(--muted)">Could not load. <a href="https://github.com/1mr0-tech/logcloak/blob/main/documentation.md">View on GitHub →</a></p>';
    document.getElementById('toc').innerHTML='';
  });
</script>
</body>
</html>
