name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io/1mr0-tech
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        binary: [webhook, controller, sidecar, cli]
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Build and push ${{ matrix.binary }}
      uses: docker/build-push-action@v6
      with:
        context: .
        file: build/Dockerfile
        build-args: |
          BINARY=${{ matrix.binary }}
          VERSION=${{ steps.version.outputs.VERSION }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.REGISTRY }}/logcloak-${{ matrix.binary }}:${{ steps.version.outputs.VERSION }}
          ${{ env.REGISTRY }}/logcloak-${{ matrix.binary }}:latest

    - name: Install Trivy
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin
        trivy --version

    - name: Trivy vulnerability scan
      run: |
        trivy image \
          --severity CRITICAL,HIGH \
          --ignore-unfixed \
          --exit-code 0 \
          --format sarif \
          --output trivy-${{ matrix.binary }}.sarif \
          ${{ env.REGISTRY }}/logcloak-${{ matrix.binary }}:${{ steps.version.outputs.VERSION }}

    - name: Upload Trivy results to GitHub Security
      if: always() && hashFiles(format('trivy-{0}.sarif', matrix.binary)) != ''
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-${{ matrix.binary }}.sarif
        category: trivy-${{ matrix.binary }}

  helm-publish:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [build-push]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Helm
      run: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Update chart version
      run: |
        sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" charts/logcloak/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" charts/logcloak/Chart.yaml

    - name: Package chart
      run: helm package charts/logcloak --destination /tmp/helm-pkg

    - name: Publish to gh-pages
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -B gh-pages origin/gh-pages
        cp /tmp/helm-pkg/*.tgz .
        helm repo index . --url https://1mr0-tech.github.io/logcloak --merge index.yaml
        git add *.tgz index.yaml
        git diff --cached --quiet && echo "nothing to commit" || git commit -m "release: logcloak-${{ steps.version.outputs.VERSION }}"
        git push origin gh-pages

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [helm-publish]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: "1.24"
        cache: true

    - name: Build release binaries
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        mkdir -p dist
        for os in linux darwin; do
          for arch in amd64 arm64; do
            for bin in webhook controller sidecar cli; do
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
                -ldflags="-s -w -X main.version=$VERSION" \
                -o dist/logcloak-${bin}-${os}-${arch} \
                ./cmd/$bin
            done
          done
        done

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/logcloak-*
        generate_release_notes: true
