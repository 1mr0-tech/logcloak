name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io/1mr0-tech

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        binary: [webhook, controller, sidecar, cli]
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
    - name: Build and push ${{ matrix.binary }}
      uses: docker/build-push-action@v5
      with:
        context: .
        file: build/Dockerfile
        build-args: |
          BINARY=${{ matrix.binary }}
          VERSION=${{ steps.version.outputs.VERSION }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.REGISTRY }}/logcloak-${{ matrix.binary }}:${{ steps.version.outputs.VERSION }}
          ${{ env.REGISTRY }}/logcloak-${{ matrix.binary }}:latest

  helm-publish:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [build-push]
    permissions:
      contents: write
      pages: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: azure/setup-helm@v4
    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
    - name: Update chart version
      run: |
        sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" charts/logcloak/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" charts/logcloak/Chart.yaml
    - name: Package chart
      run: |
        mkdir -p dist
        helm package charts/logcloak --destination dist/
    - name: Publish to gh-pages
      uses: helm/chart-releaser-action@v1.6.0
      with:
        charts_dir: charts
      env:
        CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [helm-publish]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: "1.22"
        cache: true
    - name: Build release binaries
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        for os in linux darwin; do
          for arch in amd64 arm64; do
            for bin in webhook controller sidecar cli; do
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
                -ldflags="-s -w -X main.version=$VERSION" \
                -o dist/logcloak-${bin}-${os}-${arch} \
                ./cmd/$bin
            done
          done
        done
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/logcloak-*
        generate_release_notes: true
