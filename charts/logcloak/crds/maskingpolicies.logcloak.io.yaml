apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: maskingpolicies.logcloak.io
spec:
  group: logcloak.io
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              selector:
                type: object
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
              patterns:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    builtin:
                      type: string
                    regex:
                      type: string
                  required: ["name"]
              redactWith:
                type: string
                default: "[REDACTED]"
  scope: Namespaced
  names:
    plural: maskingpolicies
    singular: maskingpolicy
    kind: MaskingPolicy
    shortNames:
    - mp
