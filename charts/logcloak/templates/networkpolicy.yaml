apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: logcloak-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: logcloak
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - port: 8443
  egress:
  - ports:
    - port: 6443
    - port: 443
